2 L490,322 L490,330 Q520,360 530,500 L530,610 Q360,660 190,610 Z" fill="#cf6e6e" stroke="#7a2f2f" stroke-width="1.5"/><line x1="260" y1="330" x2="140" y2="330" stroke="#3a9bd6" stroke-width="3" marker-end="url(#arr)" stroke-dasharray="4 3"/><text x="100" y="345" font-size="13" fill="#1f6b9c">공기 ←</text><line x1="460" y1="330" x2="580" y2="330" stroke="#3a9bd6" stroke-width="3" marker-end="url(#arr)" stroke-dasharray="4 3"/><text x="585" y="345" font-size="13" fill="#1f6b9c">→ 공기</text><text x="210" y="310" font-size="11" fill="#5a2222">← 접촉</text><text x="465" y="310" font-size="11" fill="#5a2222">접촉 →</text><text x="330" y="458" font-size="12" fill="#5a2222">중앙 함몰</text><text x="40" y="790" font-size="13" fill="#566779">예: ㄹ (설측음, 어말/겹침) — 혀 양옆으로 공기 흐름</text><text x="40" y="808" font-size="11" fill="#9aa6b3">회색 점선 = 중립(rest) · 진한 색 = 타깃 1.0 변형</text></svg>