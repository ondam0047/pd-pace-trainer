<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 820" width="720" height="820" font-family="WenQuanYi Zen Hei, Noto Sans CJK KR, sans-serif"><rect width="720" height="820" fill="#fbfbfd"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#3a9bd6"/></marker></defs><text x="40" y="44" font-size="24" font-weight="700" fill="#1d2b3a">tongue_lateral_channel</text><text x="40" y="68" font-size="14" fill="#566779">혀 중앙이 치조에 접촉 + 양옆은 낮아져 공기 통로 형성 (설측음 ㄹ)</text><text x="40" y="92" font-size="12" fill="#9aa6b3">관상면(coronal) / 정면 단면 — 입을 정면에서 본 단면도. 치조 접촉 부근에서 자른 단면.</text><path d="M180.0,300 Q210.0,180 360,160 Q510.0,180 540.0,300 L560.0,300 L560.0,100 L160.0,100 L160.0,300 Z" fill="#fde7d3" stroke="#b78a64" stroke-width="1.4"/><rect x="188" y="290" width="24" height="30" fill="#fbf6ea" stroke="#bca787" stroke-width="0.6"/><rect x="228" y="290" width="24" height="30" fill="#fbf6ea" stroke="#bca787" stroke-width="0.6"/><rect x="268" y="290" width="24" height="30" fill="#fbf6ea" stroke="#bca787" stroke-width="0.6"/><rect x="308" y="290" width="24" height="30" fill="#fbf6ea" stroke="#bca787" stroke-width="0.6"/><rect x="348" y="290" width="24" height="30" fill="#fbf6ea" stroke="#bca787" stroke-width="0.6"/><rect x="388" y="290" width="24" height="30" fill="#fbf6ea" stroke="#bca787" stroke-width="0.6"/><rect x="428" y="290" width="24" height="30" fill="#fbf6ea" stroke="#bca787" stroke-width="0.6"/><rect x="468" y="290" width="24" height="30" fill="#fbf6ea" stroke="#bca787" stroke-width="0.6"/><rect x="508" y="290" width="24" height="30" fill="#fbf6ea" stroke="#bca787" stroke-width="0.6"/><path d="M190,510 Q260,380 360,360 Q460,380 530,510 L530,610 Q360,660 190,610 Z" fill="none" stroke="#888" stroke-width="1.4" stroke-dasharray="6 4" opacity="0.55"/><text x="80" y="610" font-size="11" fill="#888" font-style="italic">중립 (rest, 평평한 돔)</text><path d="M190,510 C190,460 210,430 250,430 Q295,430 330,360 L354,322 L366,322 Q370,322 390,360 Q425,430 470,430 C510,430 530,460 530,510 L530,610 Q360,660 190,610 Z" fill="#cf6e6e" stroke="#7a2f2f" stroke-width="1.5"/><text x="314" y="282" font-size="12" font-weight="600" fill="#7a2f2f">중앙 접촉 ↓</text><line x1="265" y1="370" x2="140" y2="370" stroke="#3a9bd6" stroke-width="3" marker-end="url(#arr)" stroke-dasharray="5 3"/><text x="80" y="382" font-size="13" fill="#1f6b9c">공기 ←</text><line x1="455" y1="370" x2="580" y2="370" stroke="#3a9bd6" stroke-width="3" marker-end="url(#arr)" stroke-dasharray="5 3"/><text x="585" y="382" font-size="13" fill="#1f6b9c">→ 공기</text><text x="95" y="435" font-size="11" fill="#5a2222">혀 양옆 낮음</text><text x="95" y="450" font-size="10" fill="#566779">(틈 = 공기 통로)</text><text x="495" y="435" font-size="11" fill="#5a2222">혀 양옆 낮음</text><text x="495" y="450" font-size="10" fill="#566779">(틈 = 공기 통로)</text><line x1="250" y1="428" x2="250" y2="322" stroke="#888" stroke-width="0.6" stroke-dasharray="2 2"/><line x1="470" y1="428" x2="470" y2="322" stroke="#888" stroke-width="0.6" stroke-dasharray="2 2"/><rect x="30" y="715" width="660" height="90" rx="6" fill="#f3f7fb" stroke="#cad5e0" stroke-width="0.8"/><text x="40" y="737" font-size="13" font-weight="700" fill="#1d2b3a">설측음 (lateral) 조음 / 음향 특성</text><text x="40" y="758" font-size="12" fill="#333">• 조음: 혀끝(중앙) <tspan font-weight="600">치조에 접촉·유지</tspan>, 양옆 가장자리 <tspan font-weight="600">낮아져 공기 통로</tspan> 형성</text><text x="40" y="776" font-size="12" fill="#333">• 공기 흐름: 폐에서 올라온 공기가 중앙 폐쇄를 우회해 <tspan font-weight="600">혀 양옆으로 빠져나감</tspan></text><text x="40" y="794" font-size="12" fill="#333">• 음향: <tspan font-weight="600">공명음(sonorant)</tspan> — 모음과 유사한 formant 구조, 잡음 없음</text></svg>