<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1000" width="720" height="1000" font-family="WenQuanYi Zen Hei, Noto Sans CJK KR, sans-serif"><rect width="720" height="1000" fill="#fbfbfd"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#3a9bd6"/></marker></defs><text x="40" y="44" font-size="24" font-weight="700" fill="#1d2b3a">tongue_lateral_channel</text><text x="40" y="68" font-size="14" fill="#566779">혀 중앙(혀끝)이 치조에 접촉, 양옆은 낮아져 공기 통로 — 설측음 ㄹ</text><text x="40" y="108" font-size="15" font-weight="700" fill="#1d2b3a">① 위에서 본 모습 (Superior view)</text><text x="40" y="126" font-size="12" fill="#566779">혀를 위에서 내려다봄. 그림 위쪽 = 혀끝(앞). 양옆이 낮으므로 공기가 양옆 통로를 따라 앞으로 흐름.</text><path d="M360,155 C265,175 220,235 220,290 C220,345 255,380 305,388 L415,388 C465,380 500,345 500,290 C500,235 455,175 360,155 Z" fill="#d98484" stroke="#7a2f2f" stroke-width="1.5"/><ellipse cx="360" cy="195" rx="22" ry="18" fill="#7a2f2f" opacity="0.85"/><text x="398" y="190" font-size="12" font-weight="600" fill="#7a2f2f">치조 접촉 영역</text><text x="398" y="204" font-size="10" fill="#566779">(혀끝 ↔ 윗니 뒤 잇몸)</text><path d="M270,220 C260,240 250,270 245,310 C245,335 265,355 295,365" fill="none" stroke="#aed4e2" stroke-width="22" opacity="0.55" stroke-linecap="round"/><path d="M450,220 C460,240 470,270 475,310 C475,335 455,355 425,365" fill="none" stroke="#aed4e2" stroke-width="22" opacity="0.55" stroke-linecap="round"/><line x1="265" y1="360" x2="250" y2="215" stroke="#3a9bd6" stroke-width="3" marker-end="url(#arr)" stroke-dasharray="6 4"/><line x1="455" y1="360" x2="470" y2="215" stroke="#3a9bd6" stroke-width="3" marker-end="url(#arr)" stroke-dasharray="6 4"/><text x="140" y="295" font-size="13" fill="#1f6b9c">공기 ↑</text><text x="100" y="312" font-size="11" fill="#566779">(혀 옆 통로를 따라 앞으로)</text><text x="495" y="295" font-size="13" fill="#1f6b9c">↑ 공기</text><text x="495" y="312" font-size="11" fill="#566779">(혀 옆 통로를 따라 앞으로)</text><text x="330" y="148" font-size="12" fill="#333">↑ 혀끝 (앞)</text><text x="330" y="408" font-size="12" fill="#333">↓ 혀뿌리 (뒤)</text><text x="40" y="450" font-size="15" font-weight="700" fill="#1d2b3a">② 관상 단면 (Coronal cross-section)</text><text x="40" y="468" font-size="12" fill="#566779">치조 접촉 위치에서 정면으로 자른 단면. 혀 중앙이 치조에 닿고, 양옆은 낮아 틈이 생김.</text><path d="M180.0,560 Q210.0,460 360,440 Q510.0,460 540.0,560 L560.0,560 L560.0,400 L160.0,400 L160.0,560 Z" fill="#fde7d3" stroke="#b78a64" stroke-width="1.4"/><rect x="187" y="550" width="26" height="28" fill="#fbf6ea" stroke="#bca787" stroke-width="0.6"/><rect x="227" y="550" width="26" height="28" fill="#fbf6ea" stroke="#bca787" stroke-width="0.6"/><rect x="267" y="550" width="26" height="28" fill="#fbf6ea" stroke="#bca787" stroke-width="0.6"/><rect x="307" y="550" width="26" height="28" fill="#fbf6ea" stroke="#bca787" stroke-width="0.6"/><rect x="347" y="550" width="26" height="28" fill="#fbf6ea" stroke="#bca787" stroke-width="0.6"/><rect x="387" y="550" width="26" height="28" fill="#fbf6ea" stroke="#bca787" stroke-width="0.6"/><rect x="427" y="550" width="26" height="28" fill="#fbf6ea" stroke="#bca787" stroke-width="0.6"/><rect x="467" y="550" width="26" height="28" fill="#fbf6ea" stroke="#bca787" stroke-width="0.6"/><rect x="507" y="550" width="26" height="28" fill="#fbf6ea" stroke="#bca787" stroke-width="0.6"/><path d="M185,720 C185,670 200,665 230,665 Q270,663 310,620 Q335,590 346,578 L346,578 L374,578 Q385,590 410,620 Q450,663 490,665 C520,665 535,670 535,720 L535,810 Q360,865 185,810 Z" fill="#cf6e6e" stroke="#7a2f2f" stroke-width="1.5"/><line x1="360" y1="574" x2="360" y2="530" stroke="#7a2f2f" stroke-width="1"/><text x="316" y="522" font-size="12" font-weight="600" fill="#7a2f2f">중앙 접촉</text><line x1="260" y1="630" x2="260" y2="565" stroke="#888" stroke-width="0.7" stroke-dasharray="2 2"/><circle cx="260" cy="600" r="11" fill="none" stroke="#3a9bd6" stroke-width="2"/><circle cx="260" cy="600" r="3" fill="#3a9bd6"/><text x="100" y="605" font-size="11" fill="#1f6b9c">← 공기 (앞으로)</text><line x1="460" y1="630" x2="460" y2="565" stroke="#888" stroke-width="0.7" stroke-dasharray="2 2"/><circle cx="460" cy="600" r="11" fill="none" stroke="#3a9bd6" stroke-width="2"/><circle cx="460" cy="600" r="3" fill="#3a9bd6"/><text x="475" y="605" font-size="11" fill="#1f6b9c">공기 (앞으로) →</text><text x="95" y="670" font-size="11" fill="#5a2222">혀 양옆 낮음</text><text x="510" y="670" font-size="11" fill="#5a2222">혀 양옆 낮음</text><rect x="30" y="885" width="660" height="100" rx="6" fill="#f3f7fb" stroke="#cad5e0" stroke-width="0.8"/><text x="40" y="907" font-size="13" font-weight="700" fill="#1d2b3a">설측음 ㄹ — 조음 · 공기 · 음향</text><text x="40" y="928" font-size="12" fill="#333">• <tspan font-weight="600">조음</tspan>: 혀끝(중앙)이 치조에 <tspan font-weight="600">접촉·유지</tspan>, 양옆 가장자리는 낮아 공기 통로 형성</text><text x="40" y="948" font-size="12" fill="#333">• <tspan font-weight="600">공기</tspan>: 폐에서 올라온 공기가 중앙 폐쇄를 우회 → <tspan font-weight="600">혀 양옆 통로를 따라 앞으로 배출</tspan></text><text x="40" y="968" font-size="12" fill="#333">• <tspan font-weight="600">음향</tspan>: 공명음(sonorant) — 모음과 유사한 formant 구조, 잡음 없음</text></svg>