<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 980" width="720" height="980" font-family="WenQuanYi Zen Hei, Noto Sans CJK KR, sans-serif"><rect width="720" height="980" fill="#fbfbfd"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#3a9bd6"/></marker></defs><text x="40" y="44" font-size="24" font-weight="700" fill="#1d2b3a">tongue_groove</text><text x="40" y="68" font-size="14" fill="#566779">혀 표면 정중앙 세로 홈 (median sulcus) — 마찰음 ㅅ/ㅆ 공기 통로</text><text x="40" y="108" font-size="15" font-weight="700" fill="#1d2b3a">① 위에서 본 모습 (Superior view)</text><text x="40" y="126" font-size="12" fill="#566779">혀 표면을 위에서 내려다본 형태. 그림 위쪽 = 혀끝(앞), 아래쪽 = 혀뿌리(뒤).</text><path d="M360,155 C265,175 220,235 220,290 C220,345 255,380 305,388 L415,388 C465,380 500,345 500,290 C500,235 455,175 360,155 Z" fill="#d98484" stroke="#7a2f2f" stroke-width="1.5"/><path d="M352,178 L348,365 Q360,378 372,365 L368,178 Q360,166 352,178 Z" fill="#7a2f2f" opacity="0.7"/><line x1="360" y1="180" x2="360" y2="370" stroke="#3d1414" stroke-width="2"/><line x1="360" y1="290" x2="360" y2="115" stroke="#3a9bd6" stroke-width="3" marker-end="url(#arr)" stroke-dasharray="6 4"/><text x="380" y="125" font-size="13" fill="#1f6b9c">공기 → 앞쪽으로</text><line x1="160" y1="295" x2="220" y2="290" stroke="#5a2222" stroke-width="1"/><text x="20" y="288" font-size="12" fill="#5a2222">양옆 가장자리</text><text x="20" y="304" font-size="11" fill="#566779">(약간 상승, 윗니에 닿지 않음)</text><line x1="530" y1="270" x2="375" y2="270" stroke="#7a2f2f" stroke-width="1"/><text x="535" y="266" font-size="13" font-weight="600" fill="#7a2f2f">중앙 세로 홈</text><text x="535" y="282" font-size="11" fill="#566779">(median sulcus)</text><text x="330" y="148" font-size="12" fill="#333">↑ 혀끝 (앞)</text><text x="330" y="408" font-size="12" fill="#333">↓ 혀뿌리 (뒤)</text><text x="40" y="432" font-size="11" fill="#9aa6b3">치수(참고, 실제 해부학 기준): 홈 폭 약 4~6mm · 깊이 약 2~3mm · 길이 = 혀끝 가까이부터 설체 뒤까지</text><text x="40" y="470" font-size="15" font-weight="700" fill="#1d2b3a">② 관상면 단면 (Coronal cross-section)</text><text x="40" y="488" font-size="12" fill="#566779">정면에서 본 단면. 혀 가운데가 V형으로 깊이 함몰되고, 양옆은 약간 상승하지만 윗니에 닿지 않음.</text><path d="M180,560 Q210,460 360,440 Q510,460 540,560 L560,560 L560,410 L160,410 L160,560 Z" fill="#fde7d3" stroke="#b78a64" stroke-width="1.4"/><rect x="198" y="550" width="24" height="26" fill="#fbf6ea" stroke="#bca787" stroke-width="0.5"/><rect x="238" y="550" width="24" height="26" fill="#fbf6ea" stroke="#bca787" stroke-width="0.5"/><rect x="278" y="550" width="24" height="26" fill="#fbf6ea" stroke="#bca787" stroke-width="0.5"/><rect x="318" y="550" width="24" height="26" fill="#fbf6ea" stroke="#bca787" stroke-width="0.5"/><rect x="358" y="550" width="24" height="26" fill="#fbf6ea" stroke="#bca787" stroke-width="0.5"/><rect x="398" y="550" width="24" height="26" fill="#fbf6ea" stroke="#bca787" stroke-width="0.5"/><rect x="438" y="550" width="24" height="26" fill="#fbf6ea" stroke="#bca787" stroke-width="0.5"/><rect x="478" y="550" width="24" height="26" fill="#fbf6ea" stroke="#bca787" stroke-width="0.5"/><path d="M200,710 C200,610 230,585 260,588 Q295,595 330,635 L360,655 L390,635 Q425,595 460,588 C490,585 520,610 520,710 L520,810 Q360,860 200,810 Z" fill="#d98484" stroke="#7a2f2f" stroke-width="1.5"/><line x1="260" y1="583" x2="260" y2="573" stroke="#666" stroke-width="0.8"/><line x1="460" y1="583" x2="460" y2="573" stroke="#666" stroke-width="0.8"/><text x="100" y="550" font-size="11" fill="#666">← 틈 (닿지 않음)</text><text x="475" y="550" font-size="11" fill="#666">틈 →</text><text x="300" y="688" font-size="12" font-weight="600" fill="#5a2222">중앙 V형 함몰</text><line x1="330" y1="674" x2="357" y2="658" stroke="#5a2222" stroke-width="1"/><circle cx="360" cy="648" r="11" fill="none" stroke="#3a9bd6" stroke-width="2"/><circle cx="360" cy="648" r="3" fill="#3a9bd6"/><text x="382" y="653" font-size="12" fill="#1f6b9c">공기 (앞쪽=화면 밖으로)</text><rect x="30" y="865" width="660" height="98" rx="6" fill="#f3f7fb" stroke="#cad5e0" stroke-width="0.8"/><text x="40" y="887" font-size="13" font-weight="700" fill="#1d2b3a">tongue_lateral_channel과 구분</text><text x="40" y="908" font-size="12" fill="#333">• <tspan font-weight="600">tongue_groove</tspan>: 양옆이 윗니에 <tspan font-weight="600">닿지 않음</tspan>, 공기는 <tspan font-weight="600">중앙</tspan>으로 앞쪽 배출 (마찰음 ㅅ/ㅆ)</text><text x="40" y="928" font-size="12" fill="#333">• <tspan font-weight="600">tongue_lateral_channel</tspan>: 양옆이 윗어금니에 <tspan font-weight="600">접촉</tspan>, 공기는 <tspan font-weight="600">좌우 양옆</tspan>으로 배출 (설측음 ㄹ)</text><text x="40" y="948" font-size="11" fill="#566779">사용 시: 마찰음 ㅅ/ㅆ = tongue_tip_up(0.75~0.82, 닿지 않음) + tongue_groove(1) + jaw_open(0.3)</text></svg>